<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p class="a"></p>
    <button onclick="abc()">Click me</button>

    <script> 
        function abc(){
            const obj=JSON.parse(`{"name":"xyz","age":"17","dob":"1997-03-14"}`);
            a = new Date(obj.dob);
            console.log(a);
            var xyz=document.getElementsByClassName('a')
            xyz.innerHTML="Birthday of "+obj.name+" is " +a;
        }
        </script>
</body>
</html>
