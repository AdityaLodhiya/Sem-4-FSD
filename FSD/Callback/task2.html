<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="a" style="font-size: 10px; color:red">Hello</p>
    <button onclick="abc()">font-size</button>


    <script>
        function abc(){
            var size=15;
            setInterval(()=>{
                var obj=document.getElementById("a");
                obj.style.fontSize=size+'px'
                if (size<=50){
                    size+=15;
                }
            },2000)
        }
    </script>
</body>
</html>
